<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Instant redirect to the canonical operational demo on gdk.velonyxsystems.com.
       Both URLs (velonyxsystems.com/demos/garage/ and gdk.velonyxsystems.com)
       are owned by Velonyx Systems. The gdk subdomain is the live Next.js
       operational demo (full intake wizard, customer portal, admin dashboard,
       Stripe checkout). This page exists only to redirect any visitor who
       lands on the old path version directly to the canonical URL. -->
  <meta http-equiv="refresh" content="0; url=https://gdk.velonyxsystems.com/">
  <link rel="canonical" href="https://gdk.velonyxsystems.com/">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="/demos/garage/assets/favicon.png">
  <link rel="apple-touch-icon" href="/demos/garage/assets/gdk-crown-gold.png">

  <title>Garage Door Kings — Redirecting...</title>
  <meta name="description" content="Redirecting to the live Garage Door Kings operational demo at gdk.velonyxsystems.com.">

  <!-- Open Graph (so any link preview that reaches this URL still looks polished) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Garage Door Kings — Velonyx Systems Demo">
  <meta property="og:description" content="Live Las Vegas garage door services demo built by Velonyx Systems. Full intake, portal, admin, payments.">
  <meta property="og:image" content="https://velonyxsystems.com/demos/garage/assets/gdk-crown-gold-lg.png">
  <meta property="og:url" content="https://gdk.velonyxsystems.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #050505;
      color: #F5F0E8;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; padding: 48px 24px; max-width: 480px; }
    .crown {
      width: 96px; height: 80px;
      margin: 0 auto 28px;
      stroke: #B8732E; fill: none; stroke-width: 3;
      stroke-linejoin: round; stroke-linecap: round;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.6rem; font-weight: 600;
      color: #F2C998;
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }
    p { color: rgba(245,240,232,0.65); font-size: 0.95rem; line-height: 1.55; margin: 6px 0; }
    a { color: #B8732E; text-decoration: none; border-bottom: 1px dashed rgba(184,115,46,0.4); }
    a:hover { color: #D4843A; border-bottom-color: #D4843A; }
    .small { font-size: 0.78rem; color: rgba(245,240,232,0.4); margin-top: 24px; }
  </style>

  <script>
    // Instant redirect — runs before the meta-refresh fires.
    // Use replace() so the back button doesn't bounce visitors back here.
    (function () {
      var target = "https://gdk.velonyxsystems.com/";
      try { window.location.replace(target); }
      catch (e) { window.location.href = target; }
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <svg class="crown" viewBox="0 0 120 100" aria-hidden="true">
      <path d="M10 80 L18 28 L42 60 L60 12 L78 60 L102 28 L110 80 Z"/>
      <line x1="10" y1="88" x2="110" y2="88"/>
    </svg>
    <h1>Taking you to Garage Door Kings…</h1>
    <p>You'll land at the live operational demo at <a href="https://gdk.velonyxsystems.com/">gdk.velonyxsystems.com</a> in a moment.</p>
    <p class="small">If the redirect doesn't fire automatically, <a href="https://gdk.velonyxsystems.com/">click here</a>.</p>
  </div>
</body>
</html>
